global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'aegis-cluster'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'aegis'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['aegis-node:8080']
        labels:
          service: 'aegis-core'
          environment: 'production'
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'aegis_.*'
        action: keep

  - job_name: 'aegis-nodes'
    scrape_interval: 10s
    metrics_path: '/metrics'
    dns_sd_configs:
      - names:
          - 'aegis-node'
        type: 'A'
        port: 8080
    relabel_configs:
      - source_labels: [__meta_dns_name]
        target_label: node_name

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis-cache'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'system-metrics'
