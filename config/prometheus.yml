global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'aegis-monitoring'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "alerts.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'aegis-node'

  # AEGIS Framework metrics
  - job_name: 'aegis-api'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'aegis-api'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # AEGIS Dashboard metrics
  - job_name: 'aegis-dashboard'
    static_configs:
      - targets: ['host.docker.internal:5000']
        labels:
          service: 'aegis-dashboard'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # AEGIS P2P Network metrics
  - job_name: 'aegis-p2p'
    static_configs:
      - targets: ['host.docker.internal:8001']
        labels:
          service: 'aegis-p2p'
    metrics_path: '/metrics'
    scrape_interval: 15s
